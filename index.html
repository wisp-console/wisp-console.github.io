<!DOCTYPE html>
<html>
<head>
  <title>Wisp</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #f8f9fa, #e0c3fc);
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      color: #4a148c;
    }

    p {
      font-size: 18px;
      color: #333;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      background-color: #4a148c;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    button:hover {
      background-color: #6a1b9a;
    }
  </style>
</head>
<body>

<header>
  <h1>Wisp</h1>
  <p>Welcome to my brand website.</p>
  <button>Explore</button>
</header>

</body>
</html>

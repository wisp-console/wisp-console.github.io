<!DOCTYPE html>
<html>
<head>
  <title>Wisp</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      text-align: center;
      color: white;
    }

    header {
      padding: 80px 20px;
    }

    h1 {
      font-size: 50px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      background: linear-gradient(to right, #141e30, #243b55);
      border-radius: 20px;
      cursor: pointer;
    }

    #info {
      margin-top: 40px;
      display: none;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>
  <h1>Wisp</h1>
  <p>Welcome to my brand website.</p>
  <button onclick="showInfo()">Explore</button>

  <div id="info">
    <p>This is the information section.</p>
    <p>Wisp is a creative brand focused on innovation and design.</p>
  </div>
</header>

<script>
  function showInfo() {
    document.getElementById("info").style.display = "block";
  }
</script>

</body>
</html>
